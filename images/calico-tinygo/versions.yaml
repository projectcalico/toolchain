# Wasm output is architecture-agnostic, but the *toolchain* benefits from
# running native — building on an arm64 host with an arm64 image avoids
# qemu emulation. TinyGo upstream ships amd64 + arm64 Linux tarballs only
# (no ppc64le/s390x), so the matrix here matches the upstream coverage.
tinygo:
  version: 0.39.0
  checksum:
    sha256:
      amd64: a119801579ef0a7a4f3ee285f0caf55241eaa9e115154c2028b696770b47a846
      arm64: b2ba04d35e1020f9674ed1133de02721952ba45af2b61fa666fb8144570b02b0
# TinyGo 0.39 is the first release with Go 1.25 support and its host `go`
# invocation is capped at 1.25.x. Pin Go directly to 1.25.11 (latest 1.25
# patch on the stable channel) instead of bundling a newer Go and forcing
# GOTOOLCHAIN switching at build time — the latter requires write access to
# GOPATH/pkg/sumdb which downstream consumers (e.g. gateway/coraza-wasm)
# cannot reliably provide when the tinygo container runs as the host user via
# `--user $(id -u):$(id -g)`. When TinyGo relaxes its host-Go upper bound,
# bump in lockstep.
golang:
  version: 1.25.11
  checksum:
    sha256:
      amd64: 34f14304e856893f4ba30c2cacfe93906e9de7915c5f6aaaf3a81cdccd7ba30b
      arm64: c30bf9e156a54ea4e31fbbbf31a712b32734b58cc9a22426fa5ee632d0885124
