# The calico/tinygo image is based on the upstream tinygo/tinygo image (see
# Dockerfile for why). The TinyGo version below selects that base image tag and
# is therefore the single pin for the whole toolchain: the base already bundles
# a matching Go and a libstdc++/glibc compatible with the TinyGo binary, on both
# amd64 and arm64. No separate Go pin or tarball checksums are needed -- the
# base image digest (resolved from this tag) fixes them. TinyGo upstream ships
# amd64 + arm64 only (no ppc64le/s390x), matching this image's arch coverage.
tinygo:
  version: 0.39.0
